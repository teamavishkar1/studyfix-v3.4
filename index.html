<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StudyFix — University peer mentoring platform. Verified senior students help juniors succeed in exams through live sessions and quality study notes." />
  <title>StudyFix — Peer Mentoring Platform | Chandigarh University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>

  <!-- ============ AUTH PAGE ============ -->
  <div id="authPage" class="auth-page">
    <div class="auth-bg">
      <div class="auth-bg-circle c1"></div>
      <div class="auth-bg-circle c2"></div>
      <div class="auth-bg-circle c3"></div>
    </div>
    <div class="auth-container">
      <div class="auth-brand">
        <span class="auth-logo-icon">🎓</span>
        <span class="auth-logo-text">StudyFix</span>
        <p class="auth-tagline">Learn from the best seniors at Chandigarh University</p>
      </div>
      <div class="auth-card" id="authCard"></div>
    </div>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="appShell" class="app-shell hidden">
    <!-- Top Bar -->
    <header class="top-bar" id="topBar">
      <div class="top-bar-left">
        <span class="logo" id="logoBtn">
          <span class="logo-icon">🎓</span>
          <span class="logo-text">StudyFix</span>
        </span>
        <span class="uni-badge">Chandigarh University</span>
      </div>
      <!-- Global Search -->
      <div class="global-search">
        <svg class="gs-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="globalSearchInput" placeholder="Search mentors, notes... (⌘K)" autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn notif-btn" id="notifBtn" title="Notifications">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
        <button class="user-avatar-btn" id="userAvatarBtn">
          <span id="userAvatarText">VP</span>
        </button>
      </div>
    </header>

    <!-- Page Container -->
    <main class="page-container" id="pageContainer"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-page="home" id="nav-home">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-page="mentors" id="nav-mentors">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span>Mentors</span>
      </button>
      <button class="nav-item" data-page="notes" id="nav-notes">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <span>Notes</span>
      </button>
      <button class="nav-item" data-page="sessions" id="nav-sessions">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span>Sessions</span>
      </button>
      <button class="nav-item" data-page="profile" id="nav-profile">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zm-4 7a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <!-- Notification Panel -->
  <div class="overlay" id="overlay"></div>
  <div class="slide-panel" id="notifPanel">
    <div class="panel-header">
      <h3>Notifications</h3>
      <button class="close-btn" id="closeNotifPanel">&times;</button>
    </div>
    <div class="panel-body" id="notifList"></div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span class="toast-msg" id="toastMsg"></span>
  </div>

  <!-- Module Scripts -->
  <script src="data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/mentors.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/home.js?v=7"></script>
  <script src="js/profile.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
